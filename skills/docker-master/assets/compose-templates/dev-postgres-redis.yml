# Dev stack: app (hot reload) + Postgres + Redis
# Stack dev: app (hot reload) + Postgres + Redis
#
# Usage / Uso:
#   cp dev-postgres-redis.yml docker-compose.yml
#   cp .env.example .env  &&  edit .env
#   docker compose up
#
# This is a DEV pattern: bind mounts for hot reload, weak passwords OK, no resource limits.
# Para production, usar prod-app-db.yml o full-stack-nginx.yml.

services:
  # ==========================================================================
  # Application (your code, bind-mounted for hot reload)
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev   # or Dockerfile if you only have one
    ports:
      - "3000:3000"
    volumes:
      - ./:/app                      # bind mount source (hot reload)
      - app-node-modules:/app/node_modules   # named volume protects node_modules from bind mount
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://app:devpass@db:5432/myapp
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # Optional: command override if your Dockerfile CMD isn't dev-mode
    # command: npm run dev

  # ==========================================================================
  # PostgreSQL — dev defaults, persistent volume
  # ==========================================================================
  db:
    image: postgres:17.2-alpine3.21
    ports:
      - "5432:5432"               # exposed for local connection from host tools
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: myapp
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optional: load seed data on first start
      # - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # Redis — dev defaults
  # ==========================================================================
  redis:
    image: redis:7.4.2-alpine3.21
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # Optional: Mailhog for catching dev emails (uncomment to enable)
  # Opcional: Mailhog para capturar emails de dev (descomenta para habilitar)
  # ==========================================================================
  # mailhog:
  #   image: mailhog/mailhog:v1.0.1
  #   ports:
  #     - "1025:1025"     # SMTP
  #     - "8025:8025"     # Web UI

  # ==========================================================================
  # Optional: PgAdmin for DB management (uncomment to enable)
  # ==========================================================================
  # pgadmin:
  #   image: dpage/pgadmin4:8.14
  #   ports:
  #     - "5050:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@local
  #     PGADMIN_DEFAULT_PASSWORD: devpass
  #   depends_on:
  #     - db

volumes:
  postgres-data:
  redis-data:
  app-node-modules:    # Protects node_modules from being clobbered by bind mount
