# Full-stack production: nginx reverse proxy + frontend + backend + Postgres + Redis
# Full-stack producción: nginx reverse proxy + frontend + backend + Postgres + Redis
#
# Topology / Topología:
#   [internet] → :80/:443 → nginx → /api → backend:3001
#                               → /     → frontend:80
#                                         backend → db, redis (internal network only)
#
# Usage / Uso:
#   docker compose --env-file .env up -d

services:
  # ==========================================================================
  # NGINX reverse proxy + TLS termination
  # NGINX reverse proxy + terminación TLS
  # ==========================================================================
  nginx:
    image: nginx:1.27.4-alpine3.21
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro            # let's encrypt certs
      - nginx-cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Frontend (Next.js / SPA / static)
  # ==========================================================================
  frontend:
    image: ghcr.io/myorg/myapp-frontend:${FRONTEND_VERSION}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==========================================================================
  # Backend (API)
  # ==========================================================================
  backend:
    image: ghcr.io/myorg/myapp-backend:${BACKEND_VERSION}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://app:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    secrets:
      - jwt_signing_key
      - stripe_api_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend-net    # reachable from nginx
      - backend-net     # reachable from db/redis
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================================================
  # PostgreSQL — backend-net only (NOT exposed to frontend/internet)
  # ==========================================================================
  db:
    image: postgres:17.2-alpine3.21
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # Redis — backend-net only
  # ==========================================================================
  redis:
    image: redis:7.4.2-alpine3.21
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # Optional: certbot for Let's Encrypt cert renewal
  # Opcional: certbot para renovación de certs de Let's Encrypt
  # ==========================================================================
  # certbot:
  #   image: certbot/certbot:v2.11.0
  #   restart: unless-stopped
  #   volumes:
  #     - ./nginx/certs:/etc/letsencrypt
  #     - ./certbot/www:/var/www/certbot
  #   entrypoint: >
  #     sh -c "trap exit TERM;
  #            while :; do
  #              certbot renew --quiet --no-self-upgrade;
  #              sleep 12h & wait $${!};
  #            done"

secrets:
  jwt_signing_key:
    file: ./secrets/jwt_signing_key.txt
  stripe_api_key:
    file: ./secrets/stripe_api_key.txt

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true    # NO external internet access — defense in depth
